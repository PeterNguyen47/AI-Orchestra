name: ai-orchestra

services:
  app:
    build:
      context: .
      target: runner
    image: ai-orchestra:local
    init: true
    ports:
      - "${AI_ORCHESTRA_PORT:-3000}:3000"
    environment:
      AI_ORCHESTRA_EXECUTION_MODE: judge_fixture
      AI_ORCHESTRA_LOCAL_EXECUTION_ENABLED: "false"
      AI_ORCHESTRA_OPENAI_EXECUTION_ENABLED: "false"
      APP_NAME: AI Orchestra
      APP_VERSION: 0.1.0
      HOSTNAME: 0.0.0.0
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: 3000
    volumes:
      - judge-credentials:/run/ai-orchestra-credentials:ro
    command:
      - /bin/sh
      - -c
      - >-
        test -r /run/ai-orchestra-credentials/credentials.ready &&
        grep -qx 'AI_ORCHESTRA_JUDGE_AUTH_V1' /run/ai-orchestra-credentials/credentials.ready &&
        test -r /run/ai-orchestra-credentials/app.env &&
        set -a && . /run/ai-orchestra-credentials/app.env && set +a &&
        exec node server.js
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /app/.next/cache:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

  credential-bootstrap:
    profiles: [tools]
    build:
      context: .
      target: tooling
    image: ai-orchestra-tooling:local
    init: true
    network_mode: none
    environment:
      AI_ORCHESTRA_JUDGE_CREDENTIAL_DIRECTORY: /run/ai-orchestra-credentials
    volumes:
      - judge-credentials:/run/ai-orchestra-credentials
    entrypoint: ["npm", "run", "judge:auth", "--"]
    command: []
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  judge-readiness:
    profiles: [tools]
    build:
      context: .
      target: tooling
    image: ai-orchestra-tooling:local
    init: true
    depends_on:
      app:
        condition: service_healthy
    environment:
      AI_ORCHESTRA_EXECUTION_MODE: judge_fixture
      AI_ORCHESTRA_JUDGE_CREDENTIAL_DIRECTORY: /run/ai-orchestra-credentials
    volumes:
      - judge-credentials:/run/ai-orchestra-credentials:ro
    entrypoint: ["npm", "run", "judge:readiness", "--"]
    command: []
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  judge-credentials:

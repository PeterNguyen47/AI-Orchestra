name: ai-orchestra

services:
  app:
    build:
      context: .
      target: runner
    image: ai-orchestra:local
    init: true
    ports:
      - "${AI_ORCHESTRA_PORT:-3000}:3000"
    environment:
      APP_NAME: AI Orchestra
      APP_VERSION: 0.1.0
      HOSTNAME: 0.0.0.0
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: 3000
      DEMO_USERNAME: ${DEMO_USERNAME:-}
      DEMO_PASSWORD_HASH: ${DEMO_PASSWORD_HASH:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /app/.next/cache:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

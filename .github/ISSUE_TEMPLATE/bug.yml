name: Bug
description: Report reproducible incorrect behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: reproduction
    attributes: { label: Reproduction steps, description: Minimal numbered steps and inputs }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Actual behavior }
    validations: { required: true }
  - type: textarea
    id: impact
    attributes: { label: Impact, description: Users, severity, and frequency }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes: { label: Evidence, description: Sanitized logs, screenshots, version, and environment }
    validations: { required: true }
  - type: textarea
    id: regression
    attributes: { label: Regression test requirement, description: Test that must fail before and pass after the fix }
    validations: { required: true }

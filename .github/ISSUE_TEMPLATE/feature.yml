name: Feature
description: Propose a bounded AI Orchestra capability
title: "[AO-___] "
labels: ["enhancement"]
body:
  - type: textarea
    id: issue
    attributes: { label: Issue, description: What needs to change? }
    validations: { required: true }
  - type: textarea
    id: why
    attributes: { label: Why it matters, description: User and project value }
    validations: { required: true }
  - type: textarea
    id: scope
    attributes: { label: Scope, description: Bounded work included }
    validations: { required: true }
  - type: textarea
    id: acceptance
    attributes: { label: Acceptance criteria, description: Use verifiable checklist items }
    validations: { required: true }
  - type: textarea
    id: exclusions
    attributes: { label: Exclusions, description: Explicit non-goals }
    validations: { required: true }
  - type: textarea
    id: dependencies
    attributes: { label: Dependencies, description: Issues, decisions, services, or none }
    validations: { required: true }
  - type: textarea
    id: validation
    attributes: { label: Validation, description: Commands and evidence expected }
    validations: { required: true }
  - type: textarea
    id: docs
    attributes: { label: Documentation impact, description: Documents to add or update }
    validations: { required: true }
  - type: dropdown
    id: priority
    attributes: { label: Priority, options: [P0, P1, P2] }
    validations: { required: true }
  - type: dropdown
    id: classification
    attributes: { label: Scope classification, options: [MVP, Stretch, Roadmap] }
    validations: { required: true }

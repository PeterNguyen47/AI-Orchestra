name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check generated workflow JSON Schema
        run: npm run schema:check

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Scan committed content for secrets
        run: npm run security:secrets

      - name: Audit production dependencies
        run: npm run security:audit

      - name: Build production application
        run: npm run build

  container:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Report bounded runner capabilities
        shell: bash
        run: |
          printf 'operating_system=%s\n' "$(lsb_release --description --short)"
          printf 'cpu_architecture=%s\n' "$(uname -m)"
          printf 'docker_engine_version=%s\n' "$(docker version --format '{{.Server.Version}}')"
          printf 'docker_compose_version=%s\n' "$(docker compose version --short)"
          free --bytes | awk '/^Mem:/ { printf "available_memory_rounded_gib=%.0f\n", $7 / 1073741824 }'
          df -P -B1 . | awk 'NR == 2 { printf "available_disk_rounded_gib=%.0f\n", $4 / 1073741824 }'

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build application and tooling images
        run: docker compose --profile tools build --pull=false

      - name: Bootstrap judge authentication quietly
        run: docker compose --profile tools run --rm credential-bootstrap --quiet

      - name: Start application and wait for health
        run: docker compose up --detach --wait --wait-timeout 120

      - name: Require internal judge readiness
        run: docker compose --profile tools run --rm judge-readiness

      - name: Verify allowlisted health and application shell
        shell: bash
        run: |
          curl --fail --silent --show-error http://127.0.0.1:3000/api/health \
            | jq --exit-status 'keys | sort == ["service", "status", "timestamp", "version"]' > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null

      - name: Restart app and require readiness again
        run: |
          docker compose restart app
          docker compose up --detach --wait --wait-timeout 120
          docker compose --profile tools run --rm judge-readiness

      - name: Capture container evidence
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color --tail 100 app

      - name: Stop application and remove scoped state
        if: always()
        run: docker compose down --timeout 15 --volumes --remove-orphans

      - name: Confirm scoped Docker cleanup
        if: always()
        shell: bash
        run: |
          test -z "$(docker ps --all --quiet --filter label=com.docker.compose.project=ai-orchestra)"
          test -z "$(docker network ls --quiet --filter label=com.docker.compose.project=ai-orchestra)"
          test -z "$(docker volume ls --quiet --filter label=com.docker.compose.project=ai-orchestra)"

  browser:
    name: Authentication and accessibility browser test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install --with-deps chromium

      - name: Generate ephemeral demonstration authentication
        run: npm run demo:setup > /dev/null

      - name: Run authentication, navigation, and accessibility tests
        run: npm run test:e2e

      - name: Upload AO-005 orchestrator evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ao-005-orchestrator-evidence
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 14

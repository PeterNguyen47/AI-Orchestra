name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check generated workflow JSON Schema
        run: npm run schema:check

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Scan committed content for secrets
        run: npm run security:secrets

      - name: Audit production dependencies
        run: npm run security:audit

      - name: Build production application
        run: npm run build

  container:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build container
        run: docker compose build --pull

      - name: Start application
        run: docker compose up --detach

      - name: Wait for health endpoint
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1

      - name: Smoke test application shell
        run: curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null

      - name: Verify structured health log
        shell: bash
        run: docker compose logs --no-color | grep '"event":"health_check"'

      - name: Capture container evidence
        if: always()
        run: docker compose ps && docker compose logs --no-color

      - name: Stop application
        if: always()
        run: docker compose down --volumes --remove-orphans

  browser:
    name: Authentication and accessibility browser test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install --with-deps chromium

      - name: Generate ephemeral demonstration authentication
        run: npm run demo:setup

      - name: Run authentication, navigation, and accessibility tests
        run: npm run test:e2e

      - name: Upload AO-004 UI evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ao-004-ui-evidence
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 14
